<h1>お問い合わせ</h1>

<form>
  <p>
    <label>お名前<br>
      <input type="text" name="name">
    </label>
  </p>

  <p>
    <label>メールアドレス<br>
      <input type="email" name="email">
    </label>
  </p>

  <p>
    <label>お問い合わせ内容<br>
      <textarea name="message" rows="6"></textarea>
    </label>
  </p>

  <p>
    <button type="submit">送信する</button>
  </p>
</form>
